name: Android CI - Gestor360 ADMIN

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-v2-

      - name: Clean Gradle caches (force refresh)
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf .gradle
          echo "Gradle cache cleaned"

      - name: Ensure Gradle Wrapper 8.10.2
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew missing, generating wrapper..."
            gradle wrapper --gradle-version 8.10.2 --distribution-type all
          fi
          chmod +x gradlew

      - name: Verify Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor360-admin-debug
          path: app/build/outputs/apk/debug/app-debug.apk
