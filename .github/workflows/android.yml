name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant permissions
      run: chmod +x gradlew

    - name: Build Admin Release
      run: ./gradlew assembleAdminRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: admin-apk
        path: app/build/outputs/apk/admin/release/*.apk
